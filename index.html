<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주차쫄지마</title>
  <link rel="icon" type="image/png" href="images/favicon-32.png" />
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <style>
    @font-face {
      font-family: 'SUIT Variable';
      src: url('https://cdn.jsdelivr.net/gh/sunn-us/SUIT@2/fonts/variable/woff2/SUIT-Variable.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    /* ── 기본 리셋 ── */
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html, body { width: 100%; min-width: 0; overflow-x: hidden; }
    body { margin: 0; font-family: 'SUIT Variable', 'Segoe UI', sans-serif; font-weight: 300; background: #EEF2FB; color: #1A1A1A; }

    /* ── 헤더 ── */
    header { padding: 14px 24px; text-align: center; background: #fff; border-bottom: 1px solid #DCE4F5; }
    header img.logo-mark { display: block; height: 40px; width: auto; margin: 0 auto; }

    /* ── 레이아웃 ── */
    .hero { padding: 28px 24px 16px; max-width: 1100px; margin: 0 auto; }
    .main-content { display: grid; gap: 22px; min-width: 0; width: 100%; }
    .section { max-width: 1100px; margin: 0 auto 22px; padding: 0 24px; }
    .form-card, .data-list, .compact-list, .review-grid, .coord-row { min-width: 0; }


    /* ── 카드 ── */
    .form-card { background: #fff; border-radius: 22px; padding: 28px; box-shadow: 0 4px 24px rgba(0,0,0,.07); border: 1px solid #DCE4F5; border-top: 4px solid #7C6EF0; }
    .form-card h2 { margin: 0 0 22px; font-size: 1.2rem; color: #1A1A1A; letter-spacing: -.02em; display: flex; align-items: center; gap: 8px; font-weight: 700; }
    .form-card h2::before { content: '📝'; font-size: 1.1rem; }
    .form-card form { display: grid; gap: 20px; }
    .form-card label { display: grid; gap: 7px; font-weight: 700; font-size: 0.95rem; color: #333; }
    .form-card label span.small { font-size: 0.83rem; color: #888; font-weight: 300; line-height: 1.5; }
    .form-card input[type="text"],
    .form-card input[type="url"],
    .form-card select,
    .form-card textarea,
    .form-card input[type="file"] {
      width: 100%; border: 1.5px solid #D6E0F5; border-radius: 12px;
      padding: 13px 14px; background: #F7F9FF; font-size: 0.97rem;
      font-family: 'SUIT Variable', inherit; font-weight: 300; color: #1A1A1A;
      transition: border-color .18s ease, box-shadow .18s ease;
      min-width: 0;
    }
    .form-card input:focus, .form-card select:focus, .form-card textarea:focus {
      outline: none; border-color: #7C6EF0; box-shadow: 0 0 0 3px rgba(124,110,240,.2);
    }
    .form-card textarea { resize: vertical; min-height: 120px; }
    .form-card input[type="file"] { padding: 10px 14px; cursor: pointer; }
    .edit-note { margin: 8px 0 0; font-size: 0.88rem; color: #888; }

    /* ── 버튼 ── */
    .form-card button[type="submit"] {
      width: fit-content; padding: 13px 28px; border: none; border-radius: 999px;
      background: #7C6EF0; color: #fff;
      cursor: pointer; font-size: 1rem; font-weight: 700; font-family: inherit;
      box-shadow: 0 4px 16px rgba(124,110,240,.35); transition: transform .18s ease, box-shadow .18s ease;
    }
    .form-card button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,110,240,.45); }
    .secondary-button {
      padding: 12px 18px; border: 1.5px solid #ccc; border-radius: 999px;
      background: #fff; color: #333; cursor: pointer; font-weight: 600; font-size: 0.9rem; font-family: inherit;
      transition: all .18s ease;
    }
    .secondary-button:hover { background: #EEF2FB; border-color: #aaa; transform: translateY(-1px); }
    .form-actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-top: 8px; }

    /* ── 주소 검색 ── */
    .geocode-row { display: flex; gap: 8px; align-items: stretch; }
    .geocode-row input { flex: 1; }
    .geocode-button {
      white-space: nowrap; padding: 12px 16px; border: none;
      border-radius: 12px; background: #4F7DF3;
      color: #fff; cursor: pointer; font-size: 0.93rem; font-weight: 700; font-family: inherit;
      transition: all .18s ease;
    }
    .geocode-button:hover { background: #3D63C9; transform: translateY(-1px); }
    .geocode-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── GPS 버튼 ── */
    .gps-button {
      width: 100%; margin-top: 8px; padding: 12px 16px; border: 2px dashed #D6E0F5;
      border-radius: 12px; background: #F7F9FF;
      color: #555; cursor: pointer; font-size: 0.93rem; font-weight: 600; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .18s ease;
    }
    .gps-button:hover { border-color: #7C6EF0; color: #1A1A1A; background: #F1EEFF; }
    .gps-button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 리뷰 그리드 / 난이도 선택 ── */
    .review-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .coord-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }

    /* ── 난이도 배지 ── */
    .difficulty-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border-radius: 999px; font-weight: 700; color: #fff; font-size: 0.9rem; letter-spacing: -.01em; white-space: nowrap; }
    .green-badge { background: linear-gradient(135deg, #2ecc71, #12b47a); box-shadow: 0 3px 10px rgba(18,180,122,.3); }
    .yellow-badge { background: linear-gradient(135deg, #f9a825, #e67e00); box-shadow: 0 3px 10px rgba(230,126,0,.3); }
    .red-badge { background: linear-gradient(135deg, #ff5252, #d32f2f); box-shadow: 0 3px 10px rgba(211,47,47,.3); }

    /* ── 저장된 리뷰 ── */
    .list-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
    .list-toolbar h2 { margin: 0; }
    .list-toolbar-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .nearby-btn, .register-open-btn {
      white-space: nowrap; padding: 10px 18px; border: none;
      border-radius: 999px; background: #4F7DF3;
      color: #fff; cursor: pointer; font-size: 0.88rem; font-weight: 700; font-family: inherit;
      transition: all .18s ease;
    }
    .nearby-btn:hover, .register-open-btn:hover { background: #3D63C9; transform: translateY(-1px); }
    .nearby-btn.active { background: #2ECC71; }
    .nearby-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .register-open-btn { background: #7C6EF0; }
    .register-open-btn:hover { background: #6455D6; }
    .distance-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.82rem; font-weight: 700; color: #4F7DF3; white-space: nowrap; }

    /* ── 압축 리스트 ── */
    .compact-list { margin-top: 14px; display: flex; flex-direction: column; }
    .review-row { display: flex; align-items: center; gap: 12px; padding: 14px 6px; border-bottom: 1px solid #EEF2FB; cursor: pointer; transition: background .15s ease; border-radius: 10px; }
    .review-row:hover { background: #F7F9FF; }
    .review-row:last-child { border-bottom: none; }
    .review-row-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .review-row-dot.dot-초록불 { background: #2ecc71; }
    .review-row-dot.dot-주황불 { background: #f9a825; }
    .review-row-dot.dot-빨강불 { background: #ff5252; }
    .review-row-name { font-weight: 700; color: #1A1A1A; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .review-row-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .review-row-arrow { color: #999; font-size: 1.2rem; flex-shrink: 0; }

    /* ── 등록/상세 모달 ── */
    .register-modal-overlay, .detail-modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .register-modal-overlay.open, .detail-modal-overlay.open { display: flex; }
    .register-modal, .detail-modal {
      position: relative; width: 100%; max-width: 640px; max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal-close-btn {
      position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border: none; border-radius: 50%;
      background: #F0F4FC; color: #555; font-size: 1rem; cursor: pointer; z-index: 1;
      display: inline-flex; align-items: center; justify-content: center; transition: background .15s ease;
    }
    .modal-close-btn:hover { background: #DCE4F5; }
    #detail-modal-body h3 { margin: 0; font-size: 1.15rem; color: #1A1A1A; }
    #detail-modal-body p { margin: 7px 0; font-size: 0.93rem; color: #555; line-height: 1.5; font-weight: 300; }
    #detail-modal-body a { color: #1A1A1A; text-decoration: none; word-break: break-all; font-weight: 600; border-bottom: 1px dashed #ccc; }
    #detail-modal-body a:hover { border-bottom-color: #7C6EF0; color: #000; }
    .saved-meta { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 14px; }
    .saved-meta span { display: inline-flex; align-items: center; justify-content: center; padding: 7px 10px; border-radius: 10px; background: #F0F4FC; color: #333; font-size: 0.83rem; font-weight: 700; border: 1px solid #DCE4F5; }

    /* ── 사진 그리드 ── */
    .photo-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
    .photo-thumb { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 12px; border: 1px solid #DCE4F5; }
    .photo-btn-group { display: flex; gap: 8px; }
    .photo-btn-group button { display: flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 999px; border: 1.5px solid #D6E0F5; background: #F0F4FC; color: #333; font-size: 0.88rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; }
    .photo-btn-group button:hover { border-color: #4F7DF3; color: #4F7DF3; background: #EEF3FC; }
    .preview-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
    .preview-thumb-wrap { position: relative; }
    .preview-thumb { width: 100%; aspect-ratio: 4/3; border-radius: 12px; border: 2px dashed #7C6EF0; background-size: cover; background-position: center; }
    .preview-thumb-del { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; border: none; background: rgba(0,0,0,.55); color: #fff; font-size: 0.7rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }

    /* ── 말풍선 ── */
    .speech-bubble { position: relative; margin-top: 14px; padding: 16px; border-radius: 16px; background: #F7F9FF; border: 1px solid #DCE4F5; }
    .speech-bubble strong { display: block; margin-bottom: 6px; font-size: 0.88rem; color: #333; }
    .speech-bubble p { margin: 0; color: #555; font-size: 0.93rem; line-height: 1.65; font-weight: 300; }

    /* ── 비용 태그 선택 ── */
    .fee-tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .fee-tag-btn {
      padding: 7px 15px; border-radius: 999px; border: 1.5px solid #D6E0F5;
      background: #F0F4FC; color: #555; font-size: 0.85rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .fee-tag-btn:hover { border-color: #4F7DF3; color: #4F7DF3; background: #EEF3FC; }
    .fee-tag-btn.selected { border-color: #4F7DF3; background: #4F7DF3; color: #fff; }
    .fee-photo-preview-wrap { display: flex; align-items: flex-start; gap: 10px; margin-top: 6px; }
    .fee-photo-preview-wrap img { max-width: 160px; max-height: 120px; border-radius: 10px; border: 1.5px solid #DCE4F5; object-fit: cover; }
    .fee-photo-preview-wrap button { padding: 5px 11px; border: 1.5px solid #ccc; border-radius: 8px; background: #fff; font-size: 0.8rem; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .fee-photo-preview-wrap button:hover { background: #fee; border-color: #f55; color: #d00; }
    .fee-card-photo { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; margin-top: 10px; border: 1px solid #DCE4F5; display: block; }

    /* ── 비용 배지 ── */
    .fee-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 999px; margin-top: 10px;
      background: #F1EEFF; border: 1px solid #7C6EF0;
      color: #5B4FBE; font-size: 0.85rem; font-weight: 700;
    }
    /* ── 네비 버튼 ── */
    .nav-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 9px 14px; border-radius: 10px;
      font-size: 0.84rem; font-weight: 700; font-family: inherit;
      text-decoration: none; transition: transform .15s, opacity .15s;
      flex: 1 1 auto; justify-content: center;
    }
    .nav-btn:hover { transform: translateY(-1px); opacity: .9; }
    .nav-naver { background: #03C75A; color: #fff; }
    /* ── 카드 액션 버튼 ── */
    .card-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .card-actions button { flex: 1 1 auto; padding: 10px 14px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-size: 0.88rem; font-family: inherit; transition: transform .15s ease, opacity .15s ease; }
    .card-actions button:hover { transform: translateY(-1px); opacity: .9; }
    .request-btn { background: #F0F4FC; color: #4F7DF3; border: 1.5px solid #D6E0F5 !important; }
    .card-dates { margin: 8px 0 0; color: #999; font-size: 0.78rem; }

    /* ── 수정/삭제 요청 모달 ── */
    .request-modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 1000;
      align-items: center; justify-content: center; padding: 20px;
    }
    .request-modal-overlay.open { display: flex; }
    .request-modal {
      background: #fff; border-radius: 22px; padding: 28px;
      width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .request-modal h3 { margin: 0 0 18px; font-size: 1.1rem; font-weight: 700; color: #1A1A1A; }
    .request-type-group { display: flex; gap: 8px; margin-bottom: 16px; }
    .request-type-btn {
      flex: 1; padding: 10px; border-radius: 10px; border: 1.5px solid #D6E0F5;
      background: #F7F9FF; color: #555; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s ease;
    }
    .request-type-btn.selected { background: #7C6EF0; border-color: #7C6EF0; color: #fff; }
    .request-modal textarea {
      width: 100%; min-height: 90px; padding: 11px 13px; border: 1.5px solid #D6E0F5; border-radius: 10px;
      font-size: 0.92rem; font-family: inherit; font-weight: 300; color: #1A1A1A; outline: none; resize: vertical; box-sizing: border-box;
    }
    .request-modal textarea:focus { border-color: #4F7DF3; box-shadow: 0 0 0 3px rgba(79,125,243,.15); }
    .request-modal-actions { display: flex; gap: 10px; margin-top: 16px; justify-content: flex-end; }
    .request-modal-actions button { padding: 11px 20px; border-radius: 999px; border: none; font-weight: 700; font-family: inherit; cursor: pointer; }
    .request-cancel-btn { background: #fff; border: 1.5px solid #ccc !important; color: #555; }
    .request-submit-btn { background: #4F7DF3; color: #fff; }

    /* ── 동네 검색 ── */
    .neighborhood-search-row { display: flex; gap: 8px; margin-bottom: 12px; }
    .neighborhood-search-row input { flex: 1; }
    .neighborhood-search-btn {
      white-space: nowrap; padding: 12px 16px; border: none;
      border-radius: 12px; background: #4F7DF3;
      color: #fff; cursor: pointer; font-size: 0.93rem; font-weight: 700; font-family: inherit;
      transition: all .18s ease;
    }
    .neighborhood-search-btn:hover { background: #3D63C9; transform: translateY(-1px); }
    .neighborhood-search-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .neighborhood-reset-btn {
      white-space: nowrap; padding: 12px 16px; border: 1.5px solid #D6E0F5;
      border-radius: 12px; background: #fff; color: #555; cursor: pointer;
      font-size: 0.88rem; font-weight: 700; font-family: inherit; transition: all .18s ease;
    }
    .neighborhood-reset-btn:hover { background: #F7F9FF; border-color: #aaa; }
    .neighborhood-search-status { margin: -4px 0 14px; font-size: 0.85rem; color: #4F7DF3; font-weight: 700; }

    /* ── 지도 필터 ── */
    .map-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .filter-chip { border: 1.5px solid #D6E0F5; border-radius: 999px; background: #F7F9FF; color: #555; padding: 9px 18px; cursor: pointer; font-weight: 600; font-size: 0.9rem; font-family: inherit; transition: all .18s ease; }
    .filter-chip:hover { background: #F1EEFF; border-color: #7C6EF0; }
    .filter-chip.active { background: #7C6EF0; color: #fff; border-color: transparent; box-shadow: 0 3px 12px rgba(124,110,240,.35); font-weight: 700; }
    .map-container { width: 100%; height: 420px; border-radius: 16px; overflow: hidden; border: 1px solid #DCE4F5; background: #F0F4FC; }
    @media (max-width: 520px) { .map-container { height: 320px; } }

    /* ── 데이터 테이블 ── */
    .data-list { background: #fff; border-radius: 22px; padding: 22px; box-shadow: 0 4px 24px rgba(0,0,0,.07); border: 1px solid #DCE4F5; }
    .data-list h2 { margin: 0 0 16px; font-size: 1.1rem; color: #1A1A1A; }
    .data-list table { width: 100%; border-collapse: collapse; }
    .data-list th, .data-list td { text-align: left; padding: 11px 10px; border-bottom: 1px solid #EEF2FB; font-size: 0.92rem; }
    .data-list th { background: #F0F4FC; color: #333; font-size: 0.85rem; font-weight: 700; letter-spacing: .03em; }
    .data-list tr:last-child td { border-bottom: none; }
    .data-list tr:hover td { background: #F7F9FF; }

    /* ── 푸터 ── */
    .footer { background: #4F7DF3; color: rgba(255,255,255,.8); padding: 22px; text-align: center; font-size: 0.9rem; letter-spacing: .04em; border-top: 4px solid #7C6EF0; }

    /* ── 플로팅 버튼 ── */
    .mobile-fab { display: none; }

    /* ── 반응형 ── */
    @media (max-width: 980px) {
      .main-content { display: flex; flex-direction: column; gap: 18px; width: 100%; }
      .section { width: 100%; padding: 0; }
      .form-card button[type="submit"] { width: 100%; justify-content: center; }
      .form-actions { flex-direction: column; align-items: stretch; }
      .card-actions { flex-direction: column; }
      .saved-meta { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 720px) {
      .hero { padding: 20px 16px 12px; }
      .review-grid { grid-template-columns: 1fr; }
      .coord-row { grid-template-columns: 1fr; }
      .form-card { padding: 20px; }
      .photo-grid, .preview-grid { grid-template-columns: 1fr 1fr; }
      .mobile-fab { display: flex; align-items: center; gap: 8px; position: fixed; bottom: 20px; right: 16px; z-index: 200; padding: 14px 22px; border: none; border-radius: 999px; background: #7C6EF0; color: #fff; font-size: 0.97rem; font-weight: 700; font-family: inherit; cursor: pointer; box-shadow: 0 6px 24px rgba(124,110,240,.45); }
      body { padding-bottom: 80px; }
      .list-toolbar-actions { width: 100%; }
      .list-toolbar-actions button { flex: 1 1 auto; }
    }
    @media (max-width: 520px) {
      .hero { padding: 14px 12px 10px; }
      .form-card { padding: 16px; border-radius: 18px; }
      .saved-meta { grid-template-columns: 1fr; }
      .data-list { padding: 14px; }
      .data-list th, .data-list td { padding: 9px 6px; font-size: 0.85rem; }
      .photo-grid, .preview-grid { grid-template-columns: 1fr; }
    }
    .speaker-note { font-size: 0.88rem; color: #7886aa; margin-top: 6px; }
    .scroll-target { scroll-margin-top: 100px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js/dist/umd/supabase.min.js"></script>
  <script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpKeyId=v56ffhacmr"></script>
</head>
<body>
  <header>
    <img src="images/logo.png" alt="주차쫄지마" class="logo-mark" />
  </header>
  <main class="hero">
      <div class="main-content">
        <section class="section map-section">
          <div class="form-card">
            <h2>초보자 추천 주차장 한눈에보기</h2>

  <script>

    function openNaverNavi(el) {
      const lat = el.dataset.lat;
      const lon = el.dataset.lon;
      const name = el.dataset.name;
      const savedUrl = el.dataset.url;
      const ua = navigator.userAgent;
      const encodedName = encodeURIComponent(name);
      if (/Android/i.test(ua)) {
        window.location.href = `intent://navigation?dlat=${lat}&dlng=${lon}&dname=${encodedName}&appname=juchakjoljimma#Intent;scheme=nmap;action=android.intent.action.VIEW;category=android.intent.category.BROWSABLE;package=com.nhn.android.nmap;end`;
      } else if (/iPhone|iPad|iPod/i.test(ua)) {
        window.location.href = `nmap://navigation?dlat=${lat}&dlng=${lon}&dname=${encodedName}&appname=juchakjoljimma`;
        const t = setTimeout(() => {
          window.location.href = 'https://apps.apple.com/kr/app/id347925099';
        }, 1800);
        document.addEventListener('visibilitychange', () => { if (document.hidden) clearTimeout(t); }, { once: true });
      } else {
        // PC: 등록된 네이버지도 URL이 있으면 그대로, 없으면 좌표 검색
        const pcUrl = savedUrl || `https://map.naver.com/v5/search/${encodedName}`;
        window.open(pcUrl, '_blank');
      }
    }

    let selectedDifficultyFilter = 'all';
    let userLocation = null;
    let nearbySortEnabled = false;
    let neighborhoodLocation = null;
    let neighborhoodSearchActive = false;
    let neighborhoodLabel = '';
    const NEIGHBORHOOD_RADIUS_METERS = 5000;

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = deg => deg * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(meters) {
      return meters < 1000 ? `${Math.round(meters)}m` : `${(meters / 1000).toFixed(1)}km`;
    }

    async function searchNeighborhood() {
      const input = document.getElementById('neighborhood-search-input');
      const btn = document.getElementById('neighborhood-search-btn');
      const resetBtn = document.getElementById('neighborhood-reset-btn');
      const statusEl = document.getElementById('neighborhood-search-status');
      const query = input.value.trim();
      if (!query) { alert('동네 이름이나 주소를 입력해 주세요.'); return; }
      btn.disabled = true;
      btn.textContent = '🔍 검색 중...';
      try {
        const res = await fetch(
          `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&countrycodes=kr&limit=1`,
          { headers: { 'Accept-Language': 'ko' } }
        );
        const data = await res.json();
        if (!data || !data.length) {
          alert('해당 동네/주소를 찾을 수 없습니다.\n더 구체적으로 입력해 보세요. 예: 서울 마포구 공덕동');
          return;
        }
        const lat = parseFloat(data[0].lat);
        const lon = parseFloat(data[0].lon);
        neighborhoodLocation = { lat, lon };
        neighborhoodSearchActive = true;
        neighborhoodLabel = query;

        // GPS 내 주변 정렬과 동시에 켜지지 않도록 해제
        if (nearbySortEnabled) {
          nearbySortEnabled = false;
          const nearbyBtn = document.getElementById('nearby-btn');
          nearbyBtn.classList.remove('active');
          nearbyBtn.textContent = '📍 내 주변 가까운 순으로 보기';
        }

        resetBtn.style.display = '';
        statusEl.style.display = '';
        statusEl.textContent = `📍 "${data[0].display_name}" 주변 ${NEIGHBORHOOD_RADIUS_METERS / 1000}km 이내로 보고 있어요.`;

        // 목록 재정렬/필터링은 지도 상태와 무관하게 항상 반영
        renderReviewList(currentReviews);

        // 지도 이동/마커 갱신은 실패해도 위 목록 갱신에 영향 없도록 분리
        try {
          if (naverMap && typeof naver !== 'undefined' && naver.maps) {
            naverMap.setCenter(new naver.maps.LatLng(lat, lon));
            naverMap.setZoom(15);
          }
          renderMapMarkers(currentReviews);
        } catch (mapError) {
          console.error('지도 갱신 실패', mapError);
        }
      } catch (e) {
        alert('검색 중 오류가 발생했습니다.\n인터넷 연결을 확인해 주세요.');
      } finally {
        btn.disabled = false;
        btn.textContent = '🔍 동네 검색';
      }
    }

    function resetNeighborhoodSearch() {
      neighborhoodLocation = null;
      neighborhoodSearchActive = false;
      neighborhoodLabel = '';
      document.getElementById('neighborhood-search-input').value = '';
      document.getElementById('neighborhood-reset-btn').style.display = 'none';
      const statusEl = document.getElementById('neighborhood-search-status');
      statusEl.style.display = 'none';
      statusEl.textContent = '';
      renderMapMarkers(currentReviews);
      renderReviewList(currentReviews);
    }

    function setDifficultyFilter(value) {
      selectedDifficultyFilter = value;
      document.querySelectorAll('.filter-chip').forEach(button => {
        button.classList.toggle('active', button.dataset.filter === value);
      });
      renderMapMarkers(currentReviews);
      renderReviewList(currentReviews);
    }

    function isReviewVisibleByFilter(review) {
      return selectedDifficultyFilter === 'all' || review.difficulty === selectedDifficultyFilter;
    }

    // ── 네이버 지도 ──
    let naverMap = null;
    let mapMarkers = [];
    let currentReviews = [];
    const DIFFICULTY_COLORS = { '초록불': '#2ECC71', '주황불': '#FF9F1C', '빨강불': '#FF4D4D' };

    function initNaverMap() {
      if (typeof naver === 'undefined' || !naver.maps) return;
      const mapEl = document.getElementById('naver-map');
      if (!mapEl) return;
      naverMap = new naver.maps.Map(mapEl, {
        center: new naver.maps.LatLng(37.5665, 126.9780),
        zoom: 12
      });
    }

    function renderMapMarkers(reviews) {
      if (!naverMap) return;
      mapMarkers.forEach(({ marker, infoWindow }) => {
        infoWindow.close();
        marker.setMap(null);
      });
      mapMarkers = [];
      const bounds = new naver.maps.LatLngBounds();
      let hasAny = false;
      reviews.forEach((review, index) => {
        if (!review.lat || !review.lon || !isReviewVisibleByFilter(review)) return;
        const position = new naver.maps.LatLng(review.lat, review.lon);
        const color = DIFFICULTY_COLORS[review.difficulty] || DIFFICULTY_COLORS['빨강불'];
        const marker = new naver.maps.Marker({
          position,
          map: naverMap,
          title: review.name,
          icon: {
            content: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);"></div>`,
            anchor: new naver.maps.Point(8, 8)
          }
        });
        const safeName = String(review.name || '').replace(/"/g, '&quot;');
        const safeUrl = String(review.url || '').replace(/"/g, '&quot;');
        const infoWindow = new naver.maps.InfoWindow({
          content: `
            <div style="padding:10px 14px;font-size:13px;line-height:1.5;max-width:220px;">
              <strong style="font-size:14px;">${safeName}</strong><br/>
              <span style="color:#888;">${review.difficulty}</span><br/>
              <a href="javascript:void(0)" onclick="openNaverNavi(this)"
                 data-lat="${review.lat}" data-lon="${review.lon}" data-name="${safeName}" data-url="${safeUrl}"
                 style="display:inline-block;margin-top:6px;color:#03C75A;font-weight:700;text-decoration:none;">🗺 길찾기</a>
            </div>`
        });
        naver.maps.Event.addListener(marker, 'click', () => {
          mapMarkers.forEach(m => { if (m.infoWindow !== infoWindow) m.infoWindow.close(); });
          if (infoWindow.getMap()) infoWindow.close();
          else infoWindow.open(naverMap, marker);
        });
        mapMarkers.push({ marker, infoWindow, review });
        bounds.extend(position);
        hasAny = true;
      });
      if (hasAny && !neighborhoodSearchActive) naverMap.fitBounds(bounds);
    }


    function parseCoordsFromUrl(url) {
      try {
        const parsed = new URL(url);
        const q = parsed.searchParams;

        // 쿼리 파라미터 직접 포함된 경우
        const latQ = q.get('lat') || q.get('mlat') || q.get('y');
        const lonQ = q.get('lng') || q.get('mlon') || q.get('x');
        if (latQ && lonQ) return { lat: parseFloat(latQ), lon: parseFloat(lonQ) };

        // 네이버 지도 c= 파라미터: c=lng,lat,...
        const c = q.get('c');
        if (c) {
          const parts = c.split(',');
          if (parts.length >= 2) {
            const lng = parseFloat(parts[0]);
            const lat = parseFloat(parts[1]);
            if (!isNaN(lat) && !isNaN(lng) && lat > 30 && lat < 40) return { lat, lon: lng };
          }
        }

        // 네이버 지도 경로의 /@경도,위도,zoom 패턴 (경도 먼저!)
        const atMatch = parsed.pathname.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
        if (atMatch) return { lat: parseFloat(atMatch[2]), lon: parseFloat(atMatch[1]) };

      } catch (e) {
        return null;
      }
      return null;
    }

    function fetchGpsCoords({ manual = false } = {}) {
      const btn = document.getElementById('gps-btn');
      const statusEl = document.getElementById('gps-status');
      if (!navigator.geolocation) {
        if (statusEl) statusEl.textContent = '📍 이 브라우저는 위치 서비스를 지원하지 않아요. 주소 검색을 이용해 주세요.';
        if (manual) alert('이 브라우저는 위치 서비스를 지원하지 않습니다.');
        return;
      }
      if (btn) { btn.disabled = true; }
      if (statusEl) statusEl.textContent = '📍 현재 위치를 확인하고 있어요...';
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          document.getElementById('place-lat').value = pos.coords.latitude.toFixed(6);
          document.getElementById('place-lon').value = pos.coords.longitude.toFixed(6);
          if (btn) btn.disabled = false;
          if (statusEl) statusEl.textContent = '✅ 현재 위치를 불러왔어요. 주차장 위치와 다르면 직접 수정해 주세요.';
          if (manual) alert('좌표가 입력되었습니다.\n주차장 위치와 다르다면 직접 수정해 주세요.');
        },
        () => {
          if (btn) btn.disabled = false;
          if (statusEl) statusEl.textContent = '📍 위치를 가져오지 못했어요. 위치 권한을 허용하거나 주소 검색을 이용해 주세요.';
          if (manual) alert('위치를 가져올 수 없습니다.\n브라우저에서 위치 권한을 허용해 주세요.');
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    const STORAGE_KEY = 'parkingReviews';

    function compressImageFile(file) {
      const maxWidth = 1200, maxHeight = 900, quality = 0.75;
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            const ratio = Math.min(1, Math.min(maxWidth / w, maxHeight / h));
            w = Math.round(w * ratio); h = Math.round(h * ratio);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            try { resolve(canvas.toDataURL('image/jpeg', quality)); }
            catch (e) { resolve(null); }
          };
          img.onerror = () => resolve(null);
          img.src = reader.result;
        };
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(file);
      });
    }

    function readFilesAsDataURLs(files) {
      const list = Array.from(files).slice(0, 3);
      const compressImage = (file) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = new Image();
            img.onload = () => {
              let w = img.width, h = img.height;
              const ratio = Math.min(1, Math.min(1200 / w, 900 / h));
              w = Math.round(w * ratio); h = Math.round(h * ratio);
              const canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              try { resolve(canvas.toDataURL('image/jpeg', 0.75)); }
              catch (e) { resolve(null); }
            };
            img.onerror = () => resolve(null);
            img.src = reader.result;
          };
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(file);
        });
      };
      return Promise.all(list.map(compressImage)).then(results => results.filter(Boolean));
    }

    function importReviewsFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported)) throw new Error('올바른 리뷰 형식이 아닙니다.');
          const reviews = getSavedReviews();
          const merged = [...imported, ...reviews];
          if (!saveReviews(merged)) return;
          alert('리뷰를 복원했습니다. 기존 리뷰와 합쳐서 저장되었습니다.');
          renderSavedReviews();
        } catch (error) {
          console.error('import error', error);
          alert('복원 실패: 올바른 JSON 파일을 선택했는지 확인해 주세요.');
        }
      };
      reader.onerror = () => {
        console.error('import file read error');
        alert('파일을 읽는 중 오류가 발생했습니다.');
      };
      reader.readAsText(file, 'utf-8');
    }

async function handleFormSubmit(event) {
      event.preventDefault();
      try {
        const name = document.getElementById('place-name').value.trim();
        const url = document.getElementById('place-url').value.trim();
        const review = document.getElementById('place-review').value.trim();
        const mechanical = document.getElementById('review-mechanical').value;
        const entry = document.getElementById('review-entry').value;
        const spacing = document.getElementById('review-spacing').value;
        const availability = document.getElementById('review-availability').value;
        const difficulty = document.getElementById('review-difficulty').value;
        const fee = document.getElementById('review-fee').value.trim();
        const photos = photoDataURLs.length ? photoDataURLs : [];

        if (!name) return alert('장소명을 입력해 주세요.');

        // URL이 있으면 좌표 파싱 시도 → 없거나 실패하면 위치 좌표 입력값 사용
        let lat, lon;
        const urlCoords = url ? parseCoordsFromUrl(url) : null;
        if (urlCoords) {
          lat = urlCoords.lat;
          lon = urlCoords.lon;
          document.getElementById('place-lat').value = lat;
          document.getElementById('place-lon').value = lon;
        } else {
          const latValue = document.getElementById('place-lat').value.trim();
          const lonValue = document.getElementById('place-lon').value.trim();
          lat = parseFloat(latValue);
          lon = parseFloat(lonValue);
          if (!latValue || !lonValue || Number.isNaN(lat) || Number.isNaN(lon)) {
            return alert('위치 좌표가 필요해요.\nGPS 버튼을 눌러 현재 위치를 가져오거나, 주소 검색을 이용해 주세요.');
          }
        }
        const finalUrl = url || `https://map.naver.com/v5/search/${encodeURIComponent(name)}`;

        const reviews = USE_SUPABASE ? await fetchReviewsFromSupabase() : getSavedReviews();
        const nowIso = new Date().toISOString();
        const newReview = {
          id: crypto.randomUUID ? crypto.randomUUID() : `review-${Date.now()}`,
          name,
          url: finalUrl,
          lat,
          lon,
          review,
          mechanical,
          entry,
          spacing,
          availability,
          difficulty,
          fee,
          fee_photo: feePhotoData || null,
          photos,
          createdAt: nowIso,
          updatedAt: nowIso
        };

        reviews.unshift(newReview);
        alert('주차장 리뷰가 등록되었습니다!');
        const localSaveOk = saveReviews(reviews);
        if (USE_SUPABASE) {
          await upsertReviewToSupabase(newReview);
        } else if (!localSaveOk) {
          return;
        }
        resetFormState();
        closeRegisterModal();
        renderSavedReviews();
      } catch (err) {
        console.error('handleFormSubmit error', err);
        alert('등록 중 오류가 발생했습니다. 콘솔을 확인해 주세요.');
      }
    }

          () => {
            btn.disabled = false;
            btn.textContent = '📍 내 주변 가까운 순으로 보기';
            alert('위치를 가져올 수 없습니다.\n브라우저에서 위치 권한을 허용해 주세요.');
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });

      // 주소 → 좌표 검색 (Nominatim)
      document.getElementById('geocode-btn').addEventListener('click', async () => {
        const btn = document.getElementById('geocode-btn');
        const address = document.getElementById('place-address').value.trim();
        if (!address) { alert('주소를 입력해 주세요.'); return; }
        btn.disabled = true;
        btn.textContent = '🔍 검색 중...';
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&countrycodes=kr&limit=1`,
            { headers: { 'Accept-Language': 'ko' } }
          );
          const data = await res.json();
          if (data && data.length > 0) {
            document.getElementById('place-lat').value = parseFloat(data[0].lat).toFixed(6);
            document.getElementById('place-lon').value = parseFloat(data[0].lon).toFixed(6);
            alert(`좌표를 찾았습니다!\n${data[0].display_name}\n\n위도: ${data[0].lat}\n경도: ${data[0].lon}`);
          } else {
            alert('주소를 찾을 수 없습니다.\n더 구체적인 주소를 입력해 보세요.\n예: 서울 마포구 공덕동 473-0');
          }
        } catch (e) {
          alert('검색 중 오류가 발생했습니다.\n인터넷 연결을 확인해 주세요.');
        } finally {
          btn.disabled = false;
          btn.textContent = '🔍 좌표 검색';
        }
      });

      renderSavedReviews();
    });
  </script>
</body>
</html>
