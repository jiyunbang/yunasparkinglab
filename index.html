<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주차쫄지마</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Nadeuri';
      src: url('./fonts/HakgyoansimNadeuri-B.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Nadeuri';
      src: url('./fonts/HakgyoansimNadeuri-L.ttf') format('truetype');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }
    /* ── 기본 리셋 ── */
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    html, body { width: 100%; min-width: 0; overflow-x: hidden; }
    body { margin: 0; font-family: 'Nadeuri', 'Segoe UI', sans-serif; font-weight: 300; background: #F0EFE9; color: #1A1A1A; }

    /* ── 헤더 ── */
    header {
      background: #F5F3EE;
      color: #2A2A2A;
      padding: 0; min-height: 180px; text-align: center;
      position: relative; overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    /* 스케치 테두리 */
    header::before {
      content: ''; position: absolute; inset: 8px;
      border: 1.5px solid rgba(180,172,155,.45);
      border-radius: 3px; pointer-events: none; z-index: 3;
    }
    header::after { content: none; }
    /* 배경 주차 세로 칸 */
    .header-parking-bg {
      position: absolute; top: 0; bottom: 0; left: 0; right: 0;
      display: flex; z-index: 0;
    }
    .parking-col {
      flex: 1; border-right: 1.5px solid rgba(180,172,155,.28);
      padding: 12px 0 0;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .parking-col:last-child { border-right: none; }
    /* 자동차 공통 */
    .car-mini {
      width: 32px; height: 54px; flex-shrink: 0;
      border-radius: 8px 8px 6px 6px;
      position: relative;
      background: #E0DDD5;
      box-shadow: 2px 4px 8px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.8);
      border: 1px solid rgba(0,0,0,.1);
    }
    /* 색상 변형 */
    .car-w { background: linear-gradient(160deg,#F5F4F0,#E8E6E0); }
    .car-r { background: linear-gradient(160deg,#E8604A,#C8402E); }
    .car-b { background: linear-gradient(160deg,#5A8FD8,#3A6FBE); }
    .car-g { background: linear-gradient(160deg,#6BBF7A,#4A9F5A); }
    .car-s { background: linear-gradient(160deg,#C8C4BC,#A8A49C); }
    .car-y { background: linear-gradient(160deg,#F0C040,#D8A020); }
    /* 앞유리 */
    .car-mini::before {
      content: ''; position: absolute;
      top: 8px; left: 4px; right: 4px; height: 16px;
      background: linear-gradient(175deg, rgba(200,230,255,.9) 0%, rgba(160,205,245,.7) 100%);
      border-radius: 5px 5px 3px 3px;
      border: 1px solid rgba(100,160,220,.25);
      box-shadow: inset 0 1px 3px rgba(255,255,255,.8);
    }
    /* 뒷유리 */
    .car-mini::after {
      content: ''; position: absolute;
      bottom: 7px; left: 4px; right: 4px; height: 11px;
      background: linear-gradient(175deg, rgba(160,205,245,.65) 0%, rgba(200,230,255,.85) 100%);
      border-radius: 3px 3px 5px 5px;
      border: 1px solid rgba(100,160,220,.2);
    }
    /* P 표지판 */
    .parking-sign {
      display: inline-flex; align-items: center; justify-content: center;
      width: 40px; height: 40px;
      background: #4E7FD4; color: #fff;
      font-size: 1.5rem; font-weight: 900;
      border-radius: 8px;
      box-shadow: 3px 3px 0 rgba(0,0,0,.15);
      vertical-align: middle; margin-right: 8px;
      position: relative; bottom: 2px;
      font-family: 'Nadeuri', sans-serif;
    }
    header h1 { margin: 0; padding: 0 32px; font-size: 2.2rem; font-weight: 700; letter-spacing: -0.02em; position: relative; z-index: 2; font-family: 'Nadeuri', sans-serif; color: #2A2A2A; }
    header h1::before { content: none; }
    header h1::after  { content: none; }
    header p { display: none; }
    .header-car { display: none; }

    /* ── 레이아웃 ── */
    .hero { padding: 28px 24px 16px; max-width: 1100px; margin: 0 auto; }
    .page-layout { display: grid; grid-template-columns: 270px 1fr; gap: 22px; align-items: start; min-width: 0; width: 100%; }
    .main-content { display: grid; gap: 22px; min-width: 0; width: 100%; }
    .section { max-width: 1100px; margin: 0 auto 22px; padding: 0 24px; }
    .form-card, .data-list, .saved-list, .saved-card-grid, .review-grid, .coord-row { min-width: 0; }

    /* ── 사이드바 ── */
    .sidebar { position: sticky; top: 20px; background: #fff; border: 1px solid #E8E6DE; border-radius: 24px; padding: 22px 18px; box-shadow: 0 4px 20px rgba(0,0,0,.07); min-width: 0; width: 100%; }
    .sidebar h2 { margin: 0 0 6px; font-size: 1.05rem; color: #4E7FD4; letter-spacing: -.02em; font-weight: 700; }
    .sidebar > .sidebar-body > p { margin: 0 0 16px; font-size: 0.9rem; color: #777; line-height: 1.6; font-weight: 300; }
    .nav-list { display: grid; gap: 8px; margin-bottom: 20px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-radius: 14px; background: #F5F4EE; border: 1.5px solid #E8E6DE; color: #1A1A1A; font-weight: 700; font-size: 0.95rem; font-family: 'Nadeuri', sans-serif; text-decoration: none; transition: all .18s ease; }
    .nav-item:hover { background: #FFD23F; border-color: #FFD23F; color: #1A1A1A; transform: translateX(3px); }
    .nav-item span.icon { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; background: #E8E6DE; font-size: 1rem; flex-shrink: 0; transition: background .18s; }
    .nav-item:hover span.icon { background: rgba(0,0,0,.1); }
    .backup-card { background: #F5F4EE; border: 1px dashed #DDDBD3; border-radius: 16px; padding: 14px; }
    .backup-card p { margin: 0 0 12px; font-size: 0.85rem; color: #777; line-height: 1.5; }
    .backup-actions { display: flex; gap: 8px; flex-wrap: wrap; }

    /* ── 카드 ── */
    .form-card { background: #fff; border-radius: 22px; padding: 28px; box-shadow: 0 4px 24px rgba(0,0,0,.07); border: 1px solid #E8E6DE; border-top: 4px solid #FFD23F; }
    .form-card h2 { margin: 0 0 22px; font-size: 1.2rem; color: #1A1A1A; letter-spacing: -.02em; display: flex; align-items: center; gap: 8px; font-weight: 700; }
    .form-card h2::before { content: '📝'; font-size: 1.1rem; }
    .form-card form { display: grid; gap: 20px; }
    .form-card label { display: grid; gap: 7px; font-weight: 700; font-size: 0.95rem; color: #333; }
    .form-card label span.small { font-size: 0.83rem; color: #888; font-weight: 300; line-height: 1.5; }
    .form-card input[type="text"],
    .form-card input[type="url"],
    .form-card select,
    .form-card textarea,
    .form-card input[type="file"] {
      width: 100%; border: 1.5px solid #DDDBD3; border-radius: 12px;
      padding: 13px 14px; background: #FAFAF7; font-size: 0.97rem;
      font-family: 'Nadeuri', inherit; font-weight: 300; color: #1A1A1A;
      transition: border-color .18s ease, box-shadow .18s ease;
      min-width: 0;
    }
    .form-card input:focus, .form-card select:focus, .form-card textarea:focus {
      outline: none; border-color: #FFD23F; box-shadow: 0 0 0 3px rgba(255,210,63,.2);
    }
    .form-card textarea { resize: vertical; min-height: 120px; }
    .form-card input[type="file"] { padding: 10px 14px; cursor: pointer; }
    .edit-note { margin: 8px 0 0; font-size: 0.88rem; color: #888; }

    /* ── 버튼 ── */
    .form-card button[type="submit"] {
      width: fit-content; padding: 13px 28px; border: none; border-radius: 999px;
      background: #FFD23F; color: #1A1A1A;
      cursor: pointer; font-size: 1rem; font-weight: 700; font-family: inherit;
      box-shadow: 0 4px 16px rgba(255,210,63,.4); transition: transform .18s ease, box-shadow .18s ease;
    }
    .form-card button[type="submit"]:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,210,63,.5); }
    .secondary-button {
      padding: 12px 18px; border: 1.5px solid #ccc; border-radius: 999px;
      background: #fff; color: #333; cursor: pointer; font-weight: 600; font-size: 0.9rem; font-family: inherit;
      transition: all .18s ease;
    }
    .secondary-button:hover { background: #F0EFE9; border-color: #aaa; transform: translateY(-1px); }
    .form-actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-top: 8px; }

    /* ── 주소 검색 ── */
    .geocode-row { display: flex; gap: 8px; align-items: stretch; }
    .geocode-row input { flex: 1; }
    .geocode-button {
      white-space: nowrap; padding: 12px 16px; border: none;
      border-radius: 12px; background: #4E7FD4;
      color: #fff; cursor: pointer; font-size: 0.93rem; font-weight: 700; font-family: inherit;
      transition: all .18s ease;
    }
    .geocode-button:hover { background: #3A6EC0; transform: translateY(-1px); }
    .geocode-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── GPS 버튼 ── */
    .gps-button {
      width: 100%; margin-top: 8px; padding: 12px 16px; border: 2px dashed #DDDBD3;
      border-radius: 12px; background: #FAFAF7;
      color: #555; cursor: pointer; font-size: 0.93rem; font-weight: 600; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .18s ease;
    }
    .gps-button:hover { border-color: #FFD23F; color: #1A1A1A; background: #fffbee; }
    .gps-button:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── 리뷰 그리드 / 난이도 선택 ── */
    .review-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .coord-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }

    /* ── 난이도 배지 ── */
    .difficulty-badge { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border-radius: 999px; font-weight: 700; color: #fff; font-size: 0.9rem; letter-spacing: -.01em; white-space: nowrap; }
    .green-badge { background: linear-gradient(135deg, #2ecc71, #12b47a); box-shadow: 0 3px 10px rgba(18,180,122,.3); }
    .yellow-badge { background: linear-gradient(135deg, #f9a825, #e67e00); box-shadow: 0 3px 10px rgba(230,126,0,.3); }
    .red-badge { background: linear-gradient(135deg, #ff5252, #d32f2f); box-shadow: 0 3px 10px rgba(211,47,47,.3); }

    /* ── 저장된 리뷰 ── */
    .list-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-top: 22px; }
    .list-toolbar h3 { margin: 0; font-size: 1.05rem; font-weight: 700; color: #1A1A1A; }
    .nearby-btn {
      white-space: nowrap; padding: 10px 18px; border: none;
      border-radius: 999px; background: #4E7FD4;
      color: #fff; cursor: pointer; font-size: 0.88rem; font-weight: 700; font-family: inherit;
      transition: all .18s ease;
    }
    .nearby-btn:hover { background: #3A6EC0; transform: translateY(-1px); }
    .nearby-btn.active { background: #2ECC71; }
    .nearby-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .distance-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.82rem; font-weight: 700; color: #4E7FD4; white-space: nowrap; }
    .saved-list { margin-top: 8px; display: grid; gap: 22px; }
    .difficulty-group { background: #fff; border: 1px solid #E8E6DE; border-radius: 22px; padding: 22px; box-shadow: 0 4px 20px rgba(0,0,0,.06); }
    .group-title { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; font-size: 1.05rem; font-weight: 700; color: #1A1A1A; }
    .saved-card-grid { display: grid; gap: 16px; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .saved-item { border: 1px solid #E8E6DE; border-radius: 20px; padding: 20px; background: #fff; box-shadow: 0 2px 12px rgba(0,0,0,.05); transition: box-shadow .2s ease, transform .2s ease; border-left: 4px solid #FFD23F; }
    .saved-item:hover { box-shadow: 0 8px 28px rgba(0,0,0,.1); transform: translateY(-2px); }
    .saved-item h4 { margin: 0 0 10px; font-size: 1.08rem; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; color: #1A1A1A; }
    .saved-item p { margin: 7px 0; font-size: 0.93rem; color: #555; line-height: 1.5; font-weight: 300; }
    .saved-item small { color: #999; font-size: 0.82rem; }
    .saved-item a { color: #1A1A1A; text-decoration: none; word-break: break-all; font-weight: 600; border-bottom: 1px dashed #ccc; }
    .saved-item a:hover { border-bottom-color: #FFD23F; color: #000; }
    .saved-meta { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 14px; }
    .saved-meta span { display: inline-flex; align-items: center; justify-content: center; padding: 7px 10px; border-radius: 10px; background: #F5F4EE; color: #333; font-size: 0.83rem; font-weight: 700; border: 1px solid #E8E6DE; }

    /* ── 사진 그리드 ── */
    .photo-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; margin-top: 12px; }
    .photo-thumb { width: 100%; aspect-ratio: 4/3; object-fit: cover; border-radius: 12px; border: 1px solid #E8E6DE; }
    .photo-btn-group { display: flex; gap: 8px; }
    .photo-btn-group button { display: flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 999px; border: 1.5px solid #DDDBD3; background: #F5F4EE; color: #333; font-size: 0.88rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: all .15s; }
    .photo-btn-group button:hover { border-color: #4E7FD4; color: #4E7FD4; background: #EEF3FC; }
    .preview-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; margin-top: 10px; }
    .preview-thumb-wrap { position: relative; }
    .preview-thumb { width: 100%; aspect-ratio: 4/3; border-radius: 12px; border: 2px dashed #FFD23F; background-size: cover; background-position: center; }
    .preview-thumb-del { position: absolute; top: 4px; right: 4px; width: 22px; height: 22px; border-radius: 50%; border: none; background: rgba(0,0,0,.55); color: #fff; font-size: 0.7rem; font-weight: 900; cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1; }

    /* ── 말풍선 ── */
    .speech-bubble { position: relative; margin-top: 14px; padding: 16px; border-radius: 16px; background: #FAFAF7; border: 1px solid #E8E6DE; }
    .speech-bubble strong { display: block; margin-bottom: 6px; font-size: 0.88rem; color: #333; }
    .speech-bubble p { margin: 0; color: #555; font-size: 0.93rem; line-height: 1.65; font-weight: 300; }

    /* ── 비용 태그 선택 ── */
    .fee-tag-group { display: flex; flex-wrap: wrap; gap: 8px; }
    .fee-tag-btn {
      padding: 7px 15px; border-radius: 999px; border: 1.5px solid #DDDBD3;
      background: #F5F4EE; color: #555; font-size: 0.85rem; font-weight: 700;
      font-family: inherit; cursor: pointer; transition: all .15s;
    }
    .fee-tag-btn:hover { border-color: #4E7FD4; color: #4E7FD4; background: #EEF3FC; }
    .fee-tag-btn.selected { border-color: #4E7FD4; background: #4E7FD4; color: #fff; }
    .fee-photo-preview-wrap { display: flex; align-items: flex-start; gap: 10px; margin-top: 6px; }
    .fee-photo-preview-wrap img { max-width: 160px; max-height: 120px; border-radius: 10px; border: 1.5px solid #E8E6DE; object-fit: cover; }
    .fee-photo-preview-wrap button { padding: 5px 11px; border: 1.5px solid #ccc; border-radius: 8px; background: #fff; font-size: 0.8rem; font-weight: 700; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .fee-photo-preview-wrap button:hover { background: #fee; border-color: #f55; color: #d00; }
    .fee-card-photo { width: 100%; max-height: 180px; object-fit: cover; border-radius: 10px; margin-top: 10px; border: 1px solid #E8E6DE; display: block; }

    /* ── 비용 배지 ── */
    .fee-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 14px; border-radius: 999px; margin-top: 10px;
      background: #FFF8E1; border: 1px solid #FFD23F;
      color: #7A5F00; font-size: 0.85rem; font-weight: 700;
    }
    /* ── 네비 버튼 ── */
    .nav-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
    .nav-btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 9px 14px; border-radius: 10px;
      font-size: 0.84rem; font-weight: 700; font-family: inherit;
      text-decoration: none; transition: transform .15s, opacity .15s;
      flex: 1 1 auto; justify-content: center;
    }
    .nav-btn:hover { transform: translateY(-1px); opacity: .9; }
    .nav-naver { background: #03C75A; color: #fff; }
    /* ── 카드 액션 버튼 ── */
    .card-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
    .card-actions button { flex: 1 1 auto; padding: 10px 14px; border-radius: 10px; border: none; cursor: pointer; font-weight: 700; font-size: 0.88rem; font-family: inherit; transition: transform .15s ease, opacity .15s ease; }
    .card-actions button:hover { transform: translateY(-1px); opacity: .9; }
    .edit-review { background: #4E7FD4; color: #fff; }
    .delete-review { background: #ff5252; color: #fff; }

    /* ── 지도 필터 ── */
    .map-controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .filter-chip { border: 1.5px solid #DDDBD3; border-radius: 999px; background: #FAFAF7; color: #555; padding: 9px 18px; cursor: pointer; font-weight: 600; font-size: 0.9rem; font-family: inherit; transition: all .18s ease; }
    .filter-chip:hover { background: #fff3cc; border-color: #FFD23F; }
    .filter-chip.active { background: #FFD23F; color: #1A1A1A; border-color: transparent; box-shadow: 0 3px 12px rgba(255,210,63,.4); font-weight: 700; }
    .map-container { width: 100%; height: 420px; border-radius: 16px; overflow: hidden; border: 1px solid #E8E6DE; background: #F5F4EE; }
    @media (max-width: 520px) { .map-container { height: 320px; } }

    /* ── 데이터 테이블 ── */
    .data-list { background: #fff; border-radius: 22px; padding: 22px; box-shadow: 0 4px 24px rgba(0,0,0,.07); border: 1px solid #E8E6DE; }
    .data-list h2 { margin: 0 0 16px; font-size: 1.1rem; color: #1A1A1A; }
    .data-list table { width: 100%; border-collapse: collapse; }
    .data-list th, .data-list td { text-align: left; padding: 11px 10px; border-bottom: 1px solid #F0EFE9; font-size: 0.92rem; }
    .data-list th { background: #F5F4EE; color: #333; font-size: 0.85rem; font-weight: 700; letter-spacing: .03em; }
    .data-list tr:last-child td { border-bottom: none; }
    .data-list tr:hover td { background: #FAFAF7; }

    /* ── 푸터 ── */
    .footer { background: #4E7FD4; color: rgba(255,255,255,.8); padding: 22px; text-align: center; font-size: 0.9rem; letter-spacing: .04em; border-top: 4px solid #FFD23F; }

    /* ── 사이드바 토글 (모바일) ── */
    .sidebar-toggle { display: none; width: 100%; padding: 12px 16px; border: 1.5px solid #E8E6DE; border-radius: 12px; background: #F5F4EE; color: #1A1A1A; cursor: pointer; font-weight: 700; font-size: 0.95rem; font-family: inherit; margin-bottom: 14px; text-align: left; transition: background .18s ease; }
    .sidebar-toggle:hover { background: #E8E6DE; }
    .sidebar-toggle .arrow { float: right; transition: transform .2s ease; }
    .sidebar.open .sidebar-toggle .arrow { transform: rotate(180deg); }

    /* ── 플로팅 버튼 ── */
    .mobile-fab { display: none; }

    /* ── 반응형 ── */
    @media (max-width: 980px) {
      .page-layout { display: flex; flex-direction: column; gap: 16px; }
      .sidebar { position: static !important; top: auto !important; width: 100%; }
      .sidebar-toggle { display: block; }
      .sidebar-body { display: none; }
      .sidebar.open .sidebar-body { display: block; }
      .main-content { display: flex; flex-direction: column; gap: 18px; width: 100%; }
      .section { width: 100%; padding: 0; }
      .form-card button[type="submit"] { width: 100%; justify-content: center; }
      .form-actions { flex-direction: column; align-items: stretch; }
      .card-actions { flex-direction: column; }
      .saved-meta { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 720px) {
      header { padding: 28px 16px 56px; }
      header h1 { font-size: 2rem; }
      .hero { padding: 20px 16px 12px; }
      .review-grid { grid-template-columns: 1fr; }
      .coord-row { grid-template-columns: 1fr; }
      .form-card { padding: 20px; }
      .photo-grid, .preview-grid { grid-template-columns: 1fr 1fr; }

    function openNaverNavi(el) {

      } else if (/iPhone|iPad|iPod/i.test(ua)) {

      } else {
        // PC: 등록된 네이버지도 URL이 있으면 그대로, 없으면 좌표 검색

    let selectedDifficultyFilter = 'all';

    function haversineDistance(lat1, lon1, lat2, lon2) {
      const R = 6371000;
      const toRad = deg => deg * Math.PI / 180;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function formatDistance(meters) {
      return meters < 1000 ? `${Math.round(meters)}m` : `${(meters / 1000).toFixed(1)}km`;
    }

    function setDifficultyFilter(value) {
      selectedDifficultyFilter = value;
      document.querySelectorAll('.filter-chip').forEach(button => {
        button.classList.toggle('active', button.dataset.filter === value);
      });

    function isReviewVisibleByFilter(review) {

    // ── 네이버 지도 ──
    let naverMap = null;
    let mapMarkers = [];
    let currentReviews = [];
    const DIFFICULTY_COLORS = { '초록불': '#2ECC71', '주황불': '#FF9F1C', '빨강불': '#FF4D4D' };

    function initNaverMap() {
      if (typeof naver === 'undefined' || !naver.maps) return;
      const mapEl = document.getElementById('naver-map');
      if (!mapEl) return;
      naverMap = new naver.maps.Map(mapEl, {
        center: new naver.maps.LatLng(37.5665, 126.9780),
        zoom: 12
      });
    }

    function renderMapMarkers(reviews) {
      if (!naverMap) return;
      mapMarkers.forEach(({ marker, infoWindow }) => {
        infoWindow.close();
        marker.setMap(null);
      });
      mapMarkers = [];
      const bounds = new naver.maps.LatLngBounds();
      let hasAny = false;
      reviews.forEach((review, index) => {
        if (!review.lat || !review.lon || !isReviewVisibleByFilter(review)) return;
        const position = new naver.maps.LatLng(review.lat, review.lon);
        const color = DIFFICULTY_COLORS[review.difficulty] || DIFFICULTY_COLORS['빨강불'];
        const marker = new naver.maps.Marker({
          position,
          map: naverMap,
          title: review.name,
          icon: {
            content: `<div style="width:16px;height:16px;border-radius:50%;background:${color};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);"></div>`,
            anchor: new naver.maps.Point(8, 8)
          }
        });
        const safeName = String(review.name || '').replace(/"/g, '&quot;');
        const safeUrl = String(review.url || '').replace(/"/g, '&quot;');
        const infoWindow = new naver.maps.InfoWindow({
          content: `
            <div style="padding:10px 14px;font-size:13px;line-height:1.5;max-width:220px;">
              <strong style="font-size:14px;">${safeName}</strong><br/>
              <span style="color:#888;">${review.difficulty}</span><br/>
              <a href="javascript:void(0)" onclick="openNaverNavi(this)"
                 data-lat="${review.lat}" data-lon="${review.lon}" data-name="${safeName}" data-url="${safeUrl}"
                 style="display:inline-block;margin-top:6px;color:#03C75A;font-weight:700;text-decoration:none;">🗺 길찾기</a>
            </div>`
        });
        naver.maps.Event.addListener(marker, 'click', () => {
          mapMarkers.forEach(m => { if (m.infoWindow !== infoWindow) m.infoWindow.close(); });
          if (infoWindow.getMap()) infoWindow.close();
          else infoWindow.open(naverMap, marker);
        });
        mapMarkers.push({ marker, infoWindow, review });
        bounds.extend(position);
        hasAny = true;
      });
      if (hasAny) naverMap.fitBounds(bounds);
    }


    function parseCoordsFromUrl(url) {
      try {
        const parsed = new URL(url);
        const q = parsed.searchParams;

        // 쿼리 파라미터 직접 포함된 경우
        const latQ = q.get('lat') || q.get('mlat') || q.get('y');
        const lonQ = q.get('lng') || q.get('mlon') || q.get('x');
        if (latQ && lonQ) return { lat: parseFloat(latQ), lon: parseFloat(lonQ) };

        // 네이버 지도 c= 파라미터: c=lng,lat,...
        const c = q.get('c');
        if (c) {
          const parts = c.split(',');
          if (parts.length >= 2) {
            const lng = parseFloat(parts[0]);
            const lat = parseFloat(parts[1]);
            if (!isNaN(lat) && !isNaN(lng) && lat > 30 && lat < 40) return { lat, lon: lng };
          }
        }

        // 네이버 지도 경로의 /@경도,위도,zoom 패턴 (경도 먼저!)
        const atMatch = parsed.pathname.match(/@(-?\d+\.\d+),(-?\d+\.\d+)/);
        if (atMatch) return { lat: parseFloat(atMatch[2]), lon: parseFloat(atMatch[1]) };

      } catch (e) {
        return null;
      }
      return null;
    }

    const STORAGE_KEY = 'parkingReviews';

    function compressImageFile(file) {
      const maxWidth = 1200, maxHeight = 900, quality = 0.75;
      return new Promise((resolve) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            let w = img.width, h = img.height;
            const ratio = Math.min(1, Math.min(maxWidth / w, maxHeight / h));
            w = Math.round(w * ratio); h = Math.round(h * ratio);
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            try { resolve(canvas.toDataURL('image/jpeg', quality)); }
            catch (e) { resolve(null); }
          };
          img.onerror = () => resolve(null);
          img.src = reader.result;
        };
        reader.onerror = () => resolve(null);
        reader.readAsDataURL(file);
      });
    }

    function readFilesAsDataURLs(files) {
      const list = Array.from(files).slice(0, 3);
      const compressImage = (file) => {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = () => {
            const img = new Image();
            img.onload = () => {
              let w = img.width, h = img.height;
              const ratio = Math.min(1, Math.min(1200 / w, 900 / h));
              w = Math.round(w * ratio); h = Math.round(h * ratio);
              const canvas = document.createElement('canvas');
              canvas.width = w; canvas.height = h;
              canvas.getContext('2d').drawImage(img, 0, 0, w, h);
              try { resolve(canvas.toDataURL('image/jpeg', 0.75)); }
              catch (e) { resolve(null); }
            };
            img.onerror = () => resolve(null);
            img.src = reader.result;
          };
          reader.onerror = () => resolve(null);
          reader.readAsDataURL(file);
        });
      };
      return Promise.all(list.map(compressImage)).then(results => results.filter(Boolean));
    }

    async function fetchReviewsFromSupabase() {
      if (!USE_SUPABASE) return getLocalSavedReviews();
      const { data, error } = await supabaseClient
        .from('parking_reviews')

      if (!USE_SUPABASE) return true;
      const { error } = await supabaseClient
        .from('parking_reviews')
        .upsert({
          id: review.id,
          name: review.name,
          url: review.url,
          lat: review.lat,
          lon: review.lon,
          review: review.review,
          mechanical: review.mechanical,
          entry: review.entry,
          spacing: review.spacing,
          availability: review.availability,
          difficulty: review.difficulty,
          fee: review.fee || '',
          fee_photo: review.fee_photo || null,
          photos: JSON.stringify(review.photos || []),
          created_at: review.createdAt
        }, { onConflict: 'id' });

        console.error('Supabase save error', error);

      const reviews = getSavedReviews();
      if (!reviews.length) {
        alert('저장된 리뷰가 없습니다. 먼저 리뷰를 등록해 주세요.');
        return;
      }
      const blob = new Blob([JSON.stringify(reviews, null, 2)], { type: 'application/json;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'parking-reviews-backup.json';
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function importReviewsFile(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const imported = JSON.parse(reader.result);
          if (!Array.isArray(imported)) throw new Error('올바른 리뷰 형식이 아닙니다.');
          const reviews = getSavedReviews();
          const merged = [...imported, ...reviews];
          if (!saveReviews(merged)) return;
          alert('리뷰를 복원했습니다. 기존 리뷰와 합쳐서 저장되었습니다.');
          renderSavedReviews();
        } catch (error) {
          console.error('import error', error);
          alert('복원 실패: 올바른 JSON 파일을 선택했는지 확인해 주세요.');
        }
      };
      reader.onerror = () => {
        console.error('import file read error');
        alert('파일을 읽는 중 오류가 발생했습니다.');
      };
      reader.readAsText(file, 'utf-8');
    }

    function renderPhotoPreview() {
      const preview = document.getElementById('photo-preview');
      if (!photoDataURLs.length) { preview.innerHTML = ''; return; }
      preview.innerHTML = photoDataURLs.map((src, i) => `
        <div class="preview-thumb-wrap">
          <div class="preview-thumb" style="background-image:url('${src}')"></div>
          <button type="button" class="preview-thumb-del" data-idx="${i}">✕</button>
        </div>`).join('');
      preview.querySelectorAll('.preview-thumb-del').forEach(btn => {
        btn.addEventListener('click', () => {
          photoDataURLs.splice(Number(btn.dataset.idx), 1);
          renderPhotoPreview();
        });
      });
    }

    async function addPhotosFromFiles(files) {
      const remaining = 3 - photoDataURLs.length;
      if (remaining <= 0) return alert('사진은 최대 3장까지 등록 가능합니다.');
      const toAdd = Array.from(files).slice(0, remaining);
      const compressed = await Promise.all(toAdd.map(compressImageFile));
      photoDataURLs.push(...compressed.filter(Boolean));
      renderPhotoPreview();
    }

    async function renderSavedReviews() {
      const reviews = USE_SUPABASE ? await fetchReviewsFromSupabase() : getSavedReviews();
      currentReviews = reviews;
      renderMapMarkers(reviews);
      renderReviewList(reviews);
    }

    function renderReviewList(reviews) {
      const savedList = document.getElementById('saved-list');
      if (!reviews.length) {
        savedList.innerHTML = '<p>등록된 리뷰가 아직 없습니다.</p>';
        return;
      }
      if (nearbySortEnabled && userLocation) {
        renderNearbyList(reviews, savedList);
        return;
      }
      const groups = { '초록불': [], '주황불': [], '빨강불': [] };
      reviews.forEach((review, index) => {
        const groupKey = groups[review.difficulty] ? review.difficulty : '빨강불';
        groups[groupKey].push({ review, index });
      });
      const labels = { '초록불': '초록불 추천', '주황불': '주황불 주의', '빨강불': '빨강불 피하세요' };
      const icons = { '초록불': '🟢', '주황불': '🟠', '빨강불': '🔴' };
      const html = Object.entries(groups).map(([difficulty, items]) => {
        if (!items.length) return '';
        const sectionId = difficulty === '초록불' ? 'green-section' : difficulty === '주황불' ? 'orange-section' : 'red-section';
        return `
          <div class="difficulty-group" id="${sectionId}">
            <div class="group-title"><span>${icons[difficulty]}</span>${labels[difficulty]} (${items.length})</div>
            <div class="saved-card-grid">
              ${items.map(({review, index}) => renderReviewCard(review, index)).join('')}
            </div>
          </div>
        `;
      }).join('');
      savedList.innerHTML = html;
      attachReviewCardEvents();
    }

    function renderNearbyList(reviews, savedList) {
      const withDistance = reviews
        .map((review, index) => ({
          review,
          index,
          distance: (review.lat && review.lon)
            ? haversineDistance(userLocation.lat, userLocation.lon, review.lat, review.lon)
            : null
        }))
        .filter(item => item.distance !== null)
        .sort((a, b) => a.distance - b.distance);
      if (!withDistance.length) {
        savedList.innerHTML = '<p>좌표가 등록된 주차장이 없어서 거리순 정렬을 할 수 없어요.</p>';
        return;
      }
      const html = `
        <div class="difficulty-group">
          <div class="group-title"><span>📍</span>내 주변 가까운 순 (${withDistance.length})</div>
          <div class="saved-card-grid">
            ${withDistance.map(({ review, index, distance }) => renderReviewCard(review, index, distance)).join('')}
          </div>
        </div>
      `;
      savedList.innerHTML = html;
      attachReviewCardEvents();
    }

    function renderReviewCard(review, index, distance) {
      const badgeClass = review.difficulty === '초록불' ? 'green-badge' : review.difficulty === '주황불' ? 'yellow-badge' : 'red-badge';
      const photoHtml = review.photos && review.photos.length ? `
        <div class="photo-grid">
          ${review.photos.map(src => `<img src="${src}" class="photo-thumb" loading="lazy" />`).join('')}
        </div>
      ` : '<p style="margin-top:10px;color:#556;font-size:0.95rem;">사진이 없어요. 다음에는 사진도 꼭 추가해주세요!</p>';
      return `
        <div class="saved-item" data-index="${index}">
          <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;">
            <h4>${review.name}</h4>
            <div style="display:flex; align-items:center; gap:8px;">
              ${typeof distance === 'number' ? `<span class="distance-badge">📍 ${formatDistance(distance)}</span>` : ''}
              <span class="difficulty-badge ${badgeClass}">${review.difficulty}</span>
            </div>
          </div>
          <p><strong>위치:</strong> <a href="${review.url}" target="_blank" rel="noopener">${review.url}</a></p>
          ${photoHtml}
          ${review.fee_photo ? `<img class="fee-card-photo" src="${review.fee_photo}" alt="요금판 사진" />` : review.fee ? `<div class="fee-badge">💰 ${review.fee}</div>` : ''}
          <div class="saved-meta">
            <span>기계식: ${review.mechanical}</span>
            <span>진입로: ${review.entry}</span>
            <span>간격: ${review.spacing}</span>
            <span>여유: ${review.availability}</span>
          </div>
          <div class="speech-bubble">
            <strong>리뷰</strong>
            <p>${review.review || '-'}</p>
          </div>
          <p style="margin-top:12px;"><small>등록일: ${new Date(review.createdAt).toLocaleString()}</small></p>
          ${review.lat && review.lon ? `
          <div class="nav-actions">
            <a class="nav-btn nav-naver" href="javascript:void(0)"
               data-lat="${review.lat}" data-lon="${review.lon}"
               data-name="${review.name.replace(/"/g, '&quot;')}"
               data-url="${review.url.replace(/"/g, '&quot;')}"
               onclick="openNaverNavi(this)">🗺 네이버지도로 길찾기</a>
          </div>
          ` : ''}
          <div class="card-actions">
            <button type="button" class="edit-review" data-index="${index}">수정</button>
            <button type="button" class="delete-review" data-index="${index}">삭제</button>
          </div>
        </div>
      `;
    }

    function attachReviewCardEvents() {
      document.querySelectorAll('.edit-review').forEach(button => {
        button.addEventListener('click', () => editReview(Number(button.dataset.index)));
      });
      document.querySelectorAll('.delete-review').forEach(button => {
        button.addEventListener('click', () => deleteReview(Number(button.dataset.index)));
      });
    }

    let currentEditIndex = -1;
    let feePhotoData = null;
    let photoDataURLs = [];

    function updateEditModeNote() {
      const note = document.getElementById('edit-mode-note');
      note.textContent = currentEditIndex >= 0 ? '현재 수정 모드입니다. 새 사진을 선택하지 않으면 기존 사진이 유지됩니다.' : '';
    }

    function resetFormState() {
      currentEditIndex = -1;
      document.getElementById('review-form').reset();
      updatePhotoPreview();
      updateEditModeNote();
      document.getElementById('review-form').querySelector('button[type="submit"]').textContent = '주차장 등록하기';
      document.getElementById('cancel-edit').style.display = 'none';
      feePhotoData = null;
      photoDataURLs = [];
      renderPhotoPreview();
      document.querySelectorAll('.fee-tag-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('review-fee').value = '';
      document.getElementById('fee-photo-preview').style.display = 'none';
    }

    async function editReview(index) {
      const reviews = USE_SUPABASE ? await fetchReviewsFromSupabase() : getSavedReviews();
      const review = reviews[index];
      if (!review) return;
      currentEditIndex = index;
      document.getElementById('place-name').value = review.name;
      document.getElementById('place-url').value = review.url;
      document.getElementById('place-lat').value = review.lat || '';
      document.getElementById('place-lon').value = review.lon || '';
      document.getElementById('place-review').value = review.review;
      document.getElementById('review-mechanical').value = review.mechanical;
      document.getElementById('review-entry').value = review.entry;
      document.getElementById('review-spacing').value = review.spacing;
      document.getElementById('review-availability').value = review.availability;
      document.getElementById('review-difficulty').value = review.difficulty;
      const feeVal = review.fee || '';
      const feeInput = document.getElementById('review-fee');
      document.querySelectorAll('.fee-tag-btn').forEach(b => b.classList.remove('selected'));
      feePhotoData = review.fee_photo || null;
      if (feePhotoData) {
        document.getElementById('fee-photo-img').src = feePhotoData;
        document.getElementById('fee-photo-preview').style.display = 'flex';
        document.getElementById('fee-photo-btn').classList.add('selected');
        feeInput.value = '';
      } else {
        document.getElementById('fee-photo-preview').style.display = 'none';
        const matchingTag = document.querySelector(`.fee-tag-btn[data-value="${CSS.escape(feeVal)}"]`);
        if (matchingTag) matchingTag.classList.add('selected');
        feeInput.value = feeVal;
      }
      document.getElementById('review-form').querySelector('button[type="submit"]').textContent = '수정 저장';
      document.getElementById('cancel-edit').style.display = 'inline-flex';
      photoDataURLs = review.photos ? [...review.photos] : [];
      renderPhotoPreview();
      updateEditModeNote();
      window.location.hash = '#register-section';
    }

    async function deleteReview(index) {
      if (!confirm('이 리뷰를 삭제하시겠어요?')) return;
      const reviews = USE_SUPABASE ? await fetchReviewsFromSupabase() : getSavedReviews();
      const review = reviews[index];
      if (!review) return;
      reviews.splice(index, 1);
      if (!saveReviews(reviews)) return;
      if (USE_SUPABASE) await deleteReviewFromSupabase(review.id);
      renderSavedReviews();
    }

async function handleFormSubmit(event) {
      event.preventDefault();
      try {
        const name = document.getElementById('place-name').value.trim();
        const url = document.getElementById('place-url').value.trim();
        const review = document.getElementById('place-review').value.trim();
        const mechanical = document.getElementById('review-mechanical').value;
        const entry = document.getElementById('review-entry').value;
        const spacing = document.getElementById('review-spacing').value;
        const availability = document.getElementById('review-availability').value;
        const difficulty = document.getElementById('review-difficulty').value;
        const fee = document.getElementById('review-fee').value.trim();
        const photos = photoDataURLs.length ? photoDataURLs : [];

        if (!name) return alert('장소명을 입력해 주세요.');
        if (!url) return alert('위치 URL을 입력해 주세요.');

        // URL에서 좌표 파싱 시도 → 실패하면 수동 입력값 사용
        let lat, lon;
        const urlCoords = parseCoordsFromUrl(url);
        if (urlCoords) {
          lat = urlCoords.lat;
          lon = urlCoords.lon;
          document.getElementById('place-lat').value = lat;
          document.getElementById('place-lon').value = lon;
        } else {
          const latValue = document.getElementById('place-lat').value.trim();
          const lonValue = document.getElementById('place-lon').value.trim();
          lat = parseFloat(latValue);
          lon = parseFloat(lonValue);
          if (!latValue || !lonValue || Number.isNaN(lat) || Number.isNaN(lon)) {
            return alert('URL에서 좌표를 파싱할 수 없습니다.\n위치 좌표를 직접 입력해 주세요.');
          }
        }

        const reviews = USE_SUPABASE ? await fetchReviewsFromSupabase() : getSavedReviews();
        const reviewId = currentEditIndex >= 0 && reviews[currentEditIndex] ? reviews[currentEditIndex].id : crypto.randomUUID ? crypto.randomUUID() : `review-${Date.now()}`;
        const newReview = {
          id: reviewId,
          name,
          url,
          lat,
          lon,
          review,
          mechanical,
          entry,
          spacing,
          availability,
          difficulty,
          fee,
          fee_photo: feePhotoData || (currentEditIndex >= 0 ? (reviews[currentEditIndex] && reviews[currentEditIndex].fee_photo) || null : null),
          photos,
          createdAt: currentEditIndex >= 0 ? (reviews[currentEditIndex] && reviews[currentEditIndex].createdAt) || new Date().toISOString() : new Date().toISOString()
        };

        if (currentEditIndex >= 0) {
          reviews[currentEditIndex] = newReview;
          alert('주차장 리뷰가 수정되었습니다!');
        } else {
          reviews.unshift(newReview);
          alert('주차장 리뷰가 등록되었습니다!');
        }
        if (!saveReviews(reviews)) return;
        if (USE_SUPABASE) await upsertReviewToSupabase(newReview);
        resetFormState();
        renderSavedReviews();
      } catch (err) {
        console.error('handleFormSubmit error', err);
        alert('등록 중 오류가 발생했습니다. 콘솔을 확인해 주세요.');
      }
    }

    document.addEventListener('DOMContentLoaded', async () => {

      initNaverMap();

      document.getElementById('review-form').addEventListener('submit', handleFormSubmit);
      document.getElementById('photo-camera-btn').addEventListener('click', () => document.getElementById('place-photo-camera').click());
      document.getElementById('photo-gallery-btn').addEventListener('click', () => document.getElementById('place-photo-gallery').click());
      document.getElementById('place-photo-camera').addEventListener('change', e => { addPhotosFromFiles(e.target.files); e.target.value = ''; });
      document.getElementById('place-photo-gallery').addEventListener('change', e => { addPhotosFromFiles(e.target.files); e.target.value = ''; });
      document.getElementById('place-url').addEventListener('blur', () => {
        const url = document.getElementById('place-url').value.trim();
        if (url) {
          const coords = parseCoordsFromUrl(url);
          if (coords) {
            document.getElementById('place-lat').value = coords.lat;
            document.getElementById('place-lon').value = coords.lon;
          }
        }
      });
      document.getElementById('cancel-edit').addEventListener('click', resetFormState);

      // 비용 태그 클릭
      document.getElementById('fee-tag-group').addEventListener('click', e => {
        const btn = e.target.closest('.fee-tag-btn');
        if (!btn) return;
        if (btn.id === 'fee-photo-btn') {
          document.getElementById('fee-photo-input').click();
          return;
        }
        document.querySelectorAll('.fee-tag-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        document.getElementById('review-fee').value = btn.dataset.value;
        feePhotoData = null;
        document.getElementById('fee-photo-preview').style.display = 'none';
      });

      // 요금판 사진 선택
      document.getElementById('fee-photo-input').addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          feePhotoData = ev.target.result;
          document.getElementById('fee-photo-img').src = feePhotoData;
          document.getElementById('fee-photo-preview').style.display = 'flex';
          document.querySelectorAll('.fee-tag-btn').forEach(b => b.classList.remove('selected'));
          document.getElementById('fee-photo-btn').classList.add('selected');
          document.getElementById('review-fee').value = '';
        };
        reader.readAsDataURL(file);
        e.target.value = '';
      });

      // 요금판 사진 삭제
      document.getElementById('fee-photo-remove').addEventListener('click', () => {
        feePhotoData = null;
        document.getElementById('fee-photo-img').src = '';
        document.getElementById('fee-photo-preview').style.display = 'none';
        document.getElementById('fee-photo-btn').classList.remove('selected');
      });
      document.querySelectorAll('.filter-chip').forEach(button => {
        button.addEventListener('click', () => setDifficultyFilter(button.dataset.filter));
      });

      // GPS 좌표 자동 입력
      document.getElementById('gps-btn').addEventListener('click', () => {
        const btn = document.getElementById('gps-btn');
        if (!navigator.geolocation) {
          alert('이 브라우저는 위치 서비스를 지원하지 않습니다.');
          return;
        }
        btn.disabled = true;
        btn.textContent = '📍 위치 찾는 중...';
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            document.getElementById('place-lat').value = pos.coords.latitude.toFixed(6);
            document.getElementById('place-lon').value = pos.coords.longitude.toFixed(6);
            btn.disabled = false;
            btn.textContent = '📍 현재 위치로 좌표 자동 입력';
            alert('좌표가 입력되었습니다.\n주차장 위치와 다르다면 직접 수정해 주세요.');
          },
          () => {
            btn.disabled = false;
            btn.textContent = '📍 현재 위치로 좌표 자동 입력';
            alert('위치를 가져올 수 없습니다.\n브라우저에서 위치 권한을 허용해 주세요.');
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });

      // 내 주변 가까운 순 정렬
      document.getElementById('nearby-btn').addEventListener('click', () => {
        const btn = document.getElementById('nearby-btn');
        if (nearbySortEnabled) {
          nearbySortEnabled = false;
          btn.classList.remove('active');
          btn.textContent = '📍 내 주변 가까운 순으로 보기';
          renderReviewList(currentReviews);
          return;
        }
        if (!navigator.geolocation) {
          alert('이 브라우저는 위치 서비스를 지원하지 않습니다.');
          return;
        }
        btn.disabled = true;
        btn.textContent = '📍 위치 찾는 중...';
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            userLocation = { lat: pos.coords.latitude, lon: pos.coords.longitude };
            nearbySortEnabled = true;
            btn.disabled = false;
            btn.classList.add('active');
            btn.textContent = '📍 가까운 순 정렬 중 (해제하려면 클릭)';
            renderReviewList(currentReviews);
          },
          () => {
            btn.disabled = false;
            btn.textContent = '📍 내 주변 가까운 순으로 보기';
            alert('위치를 가져올 수 없습니다.\n브라우저에서 위치 권한을 허용해 주세요.');
          },
          { enableHighAccuracy: true, timeout: 10000 }
        );
      });

      // 주소 → 좌표 검색 (Nominatim)
      document.getElementById('geocode-btn').addEventListener('click', async () => {
        const btn = document.getElementById('geocode-btn');
        const address = document.getElementById('place-address').value.trim();
        if (!address) { alert('주소를 입력해 주세요.'); return; }
        btn.disabled = true;
        btn.textContent = '🔍 검색 중...';
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&countrycodes=kr&limit=1`,
            { headers: { 'Accept-Language': 'ko' } }
          );
          const data = await res.json();
          if (data && data.length > 0) {
            document.getElementById('place-lat').value = parseFloat(data[0].lat).toFixed(6);
            document.getElementById('place-lon').value = parseFloat(data[0].lon).toFixed(6);
            alert(`좌표를 찾았습니다!\n${data[0].display_name}\n\n위도: ${data[0].lat}\n경도: ${data[0].lon}`);
          } else {
            alert('주소를 찾을 수 없습니다.\n더 구체적인 주소를 입력해 보세요.\n예: 서울 마포구 공덕동 473-0');
          }
        } catch (e) {
          alert('검색 중 오류가 발생했습니다.\n인터넷 연결을 확인해 주세요.');
        } finally {
          btn.disabled = false;
          btn.textContent = '🔍 좌표 검색';
        }
      });

      // 모바일 사이드바 토글
      const sidebarToggle = document.getElementById('sidebar-toggle');
      if (sidebarToggle) {
        sidebarToggle.addEventListener('click', () => {
          document.querySelector('.sidebar').classList.toggle('open');
          const isOpen = document.querySelector('.sidebar').classList.contains('open');
          sidebarToggle.querySelector('.arrow').textContent = isOpen ? '▲' : '▼';
          sidebarToggle.childNodes[0].textContent = isOpen ? '☰ 메뉴 닫기 ' : '☰ 메뉴 펼치기 / 닫기 ';
        });
      }

      renderSavedReviews();
    });
  </script>
</body>
</html>
